<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendencias de Café de Especialidad 2024 | Tu Coffee Shop en Valencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #1a0f0a;
            --dark-roast: #2c1810;
            --medium-roast: #4a2c2a;
            --light-roast: #6f4e37;
            --crema: #c9a66b;
            --milk-foam: #f5f0e8;
            --latte: #d4c4a8;
            --caramel: #8b5a2b;
            --vanilla: #faf7f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--vanilla);
            color: var(--dark-roast);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--espresso) 0%, var(--dark-roast) 50%, var(--medium-roast) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a66b' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
        }

        .hero-badge {
            display: inline-block;
            background: var(--crema);
            color: var(--espresso);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--milk-foam);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero h1 span {
            color: var(--crema);
            font-style: italic;
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--latte);
            font-style: italic;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .hero-location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--crema);
            font-weight: 500;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .hero-location svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            fill: var(--crema);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .nav.visible {
            transform: translateY(0);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            color: var(--crema);
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Main Content */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        /* Introduction */
        .intro {
            background: linear-gradient(to bottom, var(--milk-foam), var(--vanilla));
            padding: 5rem 1.5rem;
            text-align: center;
        }

        .intro-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .intro-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: var(--dark-roast);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intro-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--crema);
        }

        .intro h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--dark-roast);
            margin-bottom: 1.5rem;
        }

        .intro p {
            font-size: 1.1rem;
            color: var(--light-roast);
            line-height: 1.9;
        }

        .intro .highlight {
            color: var(--dark-roast);
            font-weight: 600;
        }

        /* Story Section */
        .story-section {
            padding: 4rem 1.5rem;
            background: var(--vanilla);
        }

        .story-card {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(74, 44, 42, 0.1);
        }

        .story-image {
            height: 300px;
            background: linear-gradient(45deg, var(--medium-roast), var(--light-roast));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .story-image::after {
            content: '☕';
            font-size: 5rem;
            opacity: 0.3;
        }

        .story-content {
            padding: 3rem 2rem;
        }

        .story-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark-roast);
            margin-bottom: 1rem;
        }

        .story-content p {
            color: var(--light-roast);
            margin-bottom: 1.5rem;
        }

        .story-quote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: var(--medium-roast);
            padding: 1.5rem;
            border-left: 4px solid var(--crema);
            background: var(--milk-foam);
            margin: 2rem 0;
        }

        /* Trends Section */
        .trends-section {
            padding: 5rem 1.5rem;
            background: linear-gradient(180deg, var(--milk-foam) 0%, var(--vanilla) 100%);
        }

        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 4rem;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--dark-roast);
            margin-bottom: 1rem;
        }

        .section-header p {
            color: var(--light-roast);
            font-size: 1.1rem;
        }

        .trends-grid {
            display: grid;
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .trend-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(74, 44, 42, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .trend-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(74, 44, 42, 0.15);
        }

        .trend-header {
            padding: 2rem;
            background: linear-gradient(135deg, var(--dark-roast), var(--medium-roast));
            position: relative;
        }

        .trend-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--crema);
            opacity: 0.3;
            position: absolute;
            top: 1rem;
            right: 2rem;
            font-weight: 700;
        }

        .trend-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--milk-foam);
            position: relative;
        }

        .trend-body {
            padding: 2rem;
        }

        .trend-body p {
            color: var(--light-roast);
            margin-bottom: 1.5rem;
        }

        .trend-features {
            list-style: none;
        }

        .trend-features li {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--milk-foam);
        }

        .trend-features li:last-child {
            border-bottom: none;
        }

        .trend-features .icon {
            width: 24px;
            height: 24px;
            background: var(--crema);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--espresso);
            font-size: 0.8rem;
        }

        .trend-features span {
            color: var(--dark-roast);
            font-weight: 500;
        }

        /* Valencia Section */
        .valencia-section {
            padding: 5rem 1.5rem;
            background: var(--dark-roast);
            position: relative;
            overflow: hidden;
        }

        .valencia-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.
