<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendencias de Café de Especialidad en Valencia 2024 | Guía para tu Coffee Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Caveat:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #1a0f0a;
            --dark-roast: #2c1810;
            --medium-roast: #4a2c2a;
            --light-roast: #6f4e37;
            --caramel: #8b6914;
            --cream: #f5f0e8;
            --milk-foam: #faf8f5;
            --gold-accent: #c9a227;
            --warm-brown: #a67c52;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--milk-foam);
            color: var(--dark-roast);
            line-height: 1.8;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--espresso) 0%, var(--dark-roast) 50%, var(--medium-roast) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        .hero-badge {
            display: inline-block;
            background: var(--gold-accent);
            color: var(--espresso);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--cream);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .hero h1 span {
            color: var(--gold-accent);
            font-style: italic;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--cream);
            opacity: 0.9;
            margin-bottom: 2rem;
            font-weight: 300;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .coffee-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: steam 2s ease-in-out infinite;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--cream);
            opacity: 0.7;
            animation: bounce 2s infinite;
        }

        /* Navigation */
        .nav-container {
            background: var(--milk-foam);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(26, 15, 10, 0.1);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--medium-roast);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--light-roast);
            color: var(--cream);
        }

        /* Main Content */
        .article-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* Intro Section */
        .intro-section {
            background: linear-gradient(135deg, var(--cream) 0%, var(--milk-foam) 100%);
            padding: 4rem 2rem;
            border-radius: 30px;
            margin-bottom: 4rem;
            position: relative;
            overflow: hidden;
        }

        .intro-section::before {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 15rem;
            color: var(--light-roast);
            opacity: 0.1;
            position: absolute;
            top: -3rem;
            left: 1rem;
        }

        .intro-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-style: italic;
            color: var(--medium-roast);
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .author-note {
            font-family: 'Caveat', cursive;
            font-size: 1.4rem;
            color: var(--light-roast);
            margin-top: 2rem;
            text-align: right;
        }

        /* Section Styles */
        .section {
            margin-bottom: 5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .section-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--light-roast);
            opacity: 0.3;
            line-height: 1;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--dark-roast);
            line-height: 1.2;
        }

        .section p {
            font-size: 1.1rem;
            color: var(--medium-roast);
            margin-bottom: 1.5rem;
        }

        /* Trend Cards */
        .trend-cards {
            display: grid;
            gap: 2rem;
            margin: 3rem 0;
        }

        .trend-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(26, 15, 10, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .trend-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(26, 15, 10, 0.15);
        }

        .trend-card-header {
            background: linear-gradient(135deg, var(--medium-roast) 0%, var(--light-roast) 100%);
            padding: 2rem;
            color: var(--cream);
        }

        .trend-card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .trend-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .trend-card-body {
            padding: 2rem;
        }

        .trend-card-body p {
            font-size: 1rem;
            color: var(--medium-roast);
            margin-bottom: 1rem;
        }

        /* Stats Box */
        .stats-box {
            background: var(--espresso);
            color: var(--cream);
            padding: 3rem 2rem;
            border-radius: 20px;
            margin: 3rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .stat-item h4 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--gold-accent);
            margin-bottom: 0.5rem;
        }

        .stat-item p {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Valencia Section */
        .valencia-highlight {
            background: linear-gradient(135deg, var(--light-roast) 0%, var(--warm-brown) 100%);
            color: var(--cream);
            padding: 4rem 2rem;
            border-radius: 30px;
            margin: 4rem 0;
            position: relative;
            overflow: hidden;
        }

        .valencia-highlight::after {
            content: '☀️';
            font-size: 10rem;
            position: absolute;
            right: -2rem;
            bottom: -2rem;
            opacity: 0.2;
        }

        .valencia-highlight h3 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 1.5rem;
        }

        .valencia-highlight p {
            font-size: 1.1rem;
            opacity: 0.95;
            max-width: 600px;
        }

        /* Checklist */
        .checklist {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(26, 15, 10, 0.1);
            margin: 3rem 0;
        }

        .checklist h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark-roast);
            margin-bottom: 2rem;
            text-align: center;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(111, 78, 55, 0.1);
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .check-icon {
            width: 30px;
            height: 30px;
            background: var(--gold-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--espresso);
            font-weight: bold;
        }

        .checklist-item h4 {
            font-size: 1.1rem;
            color: var(--dark-roast);
            margin-bottom: 0.3rem;
        }

        .checklist-item p {
            font-size: 0.95rem;
            color: var(--light-roast);
        }

        /* Quote Box */
        .quote-box {
            background: var(--cream);
            border-left: 5px solid var(--gold-accent);
            padding: 2rem;
            margin: 3rem 0;
            border-radius: 0 20px 20px 0;
        }

        .quote-box p {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: var(--medium-roast);
            margin-bottom: 1rem;
        }

        .quote-box cite {
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            color: var(--light-roast);
            font-style: normal;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--dark-roast) 0%, var(--espresso) 100%);
            padding: 5rem 2rem;
            border-radius: 30px;
            text-align: center;
            color: var(--cream);
            margin: 4rem 0;
        }

        .cta-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1.5rem;
        }

        .cta-section p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

            background: var(--gold-accent);
            color: var(--espresso);
