<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café de Especialidad en Valencia | Guía 2024</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coffee-dark: #2C1810;
            --coffee-medium: #4A2C2A;
            --coffee-light: #6F4E37;
            --cream: #F5E6D3;
            --cream-light: #FDF8F3;
            --espresso: #1A0F0A;
            --caramel: #C4A35A;
            --milk-foam: #FEFEFE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--cream-light);
            color: var(--coffee-dark);
            line-height: 1.8;
        }

        /* Header Hero */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--coffee-dark) 0%, var(--coffee-medium) 50%, var(--coffee-light) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        .hero-badge {
            display: inline-block;
            background: var(--caramel);
            color: var(--espresso);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--milk-foam);
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .hero h1 span {
            color: var(--caramel);
            font-style: italic;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--cream);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            fill: var(--cream);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(44, 24, 16, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        nav.visible {
            transform: translateY(0);
        }

        nav .logo {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            font-size: 1.5rem;
        }

        /* Main Content */
        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        /* Story Section */
        .story-intro {
            background: linear-gradient(180deg, var(--cream) 0%, var(--cream-light) 100%);
            padding: 5rem 1.5rem;
            text-align: center;
        }

        .story-intro .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .story-intro h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--coffee-dark);
            margin-bottom: 2rem;
        }

        .story-intro p {
            font-size: 1.15rem;
            color: var(--coffee-medium);
            max-width: 650px;
            margin: 0 auto;
        }

        .dropcap {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            line-height: 0.8;
            padding-right: 1rem;
            color: var(--coffee-light);
        }

        /* Article Sections */
        article {
            padding: 3rem 0;
        }

        article h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--coffee-dark);
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 1rem;
        }

        article h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--caramel);
        }

        article h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--coffee-medium);
            margin: 2.5rem 0 1rem;
        }

        article p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--coffee-medium);
        }

        /* Trend Cards */
        .trends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .trend-card {
            background: var(--milk-foam);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(44, 24, 16, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .trend-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(44, 24, 16, 0.15);
        }

        .trend-card-image {
            height: 200px;
            background: linear-gradient(135deg, var(--coffee-light), var(--coffee-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .trend-card-content {
            padding: 2rem;
        }

        .trend-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--coffee-dark);
            margin-bottom: 0.75rem;
        }

        .trend-card p {
            font-size: 1rem;
            color: var(--coffee-light);
            margin-bottom: 1rem;
        }

        .trend-tag {
            display: inline-block;
            background: var(--cream);
            color: var(--coffee-medium);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Quote Section */
        .quote-section {
            background: var(--coffee-dark);
            padding: 5rem 2rem;
            margin: 4rem -1.5rem;
            text-align: center;
        }

        .quote-section blockquote {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--cream);
            font-style: italic;
            max-width: 700px;
            margin: 0 auto 1.5rem;
            line-height: 1.5;
        }

        .quote-section cite {
            color: var(--caramel);
            font-size: 1rem;
            font-style: normal;
            font-weight: 700;
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            padding: 3rem 0;
            text-align: center;
        }

        .stat-item {
            padding: 1.5rem;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--coffee-dark);
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--coffee-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Valencia Section */
        .valencia-section {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-light) 100%);
            border-radius: 30px;
            padding: 3rem 2rem;
            margin: 3rem 0;
        }

        .valencia-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--coffee-dark);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .location-benefits {
            list-style: none;
        }

        .location-benefits li {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(111, 78, 55, 0.2);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .location-benefits li:last-child {
            border-bottom: none;
        }

        .benefit-icon {
            width: 50px;
            height: 50px;
            background: var(--coffee-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .benefit-text h4 {
            font-family: 'Playfair Display', serif;
            color: var(--coffee-dark);
            margin-bottom: 0.3rem;
        }

        .benefit-text p {
            font-size: 0.95rem;
            margin: 0;
        }

        /* Checklist */
        .checklist {
            background: var(--milk-foam);
            border-radius: 20px;
            padding: 2.5rem;
            margin: 3rem 0;
            box-shadow: 0 10px 40px rgba(44, 24, 16, 0.08);
        }

        .checklist h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--coffee-dark);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .checklist ul {
            list-style: none;
        }

        .checklist li {
            padding: 1rem 0;
            border-bottom: 1px dashed var(--cream);
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.05rem;
        }

        .checklist li:last-child {
            border-bottom: none;
        }

        .check-icon {
            width: 28px;
            height: 28px;
            background: var(--caramel);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .check-icon svg {
            width: 14px;
            height: 14px;
            fill: var(--espresso);
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--coffee-medium) 0%, var(--coffee-dark) 100%);
            border-radius: 30px;
            padding: 4rem 2rem;
            text-align: center;
            margin: 4rem 0;
        }

        .cta-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--milk-foam);
            margin-bottom: 1rem;
        }

        .cta-section h2::after {
            display: none;
        }

        .cta-section p {
            color: var(--cream);
            max-width: 500px;
            margin: 0 auto 2rem
