<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendencias de Café de Especialidad 2024 | Abre tu Coffee Shop en Valencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #1a0f0a;
            --dark-roast: #2c1810;
            --medium-roast: #4a2c2a;
            --light-roast: #6f4e37;
            --caramel: #8b5a2b;
            --cream: #f5e6d3;
            --latte: #e8d4b8;
            --foam: #faf6f0;
            --gold: #c9a227;
            --terracotta: #c67c4e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--foam);
            color: var(--dark-roast);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--espresso) 0%, var(--dark-roast) 50%, var(--medium-roast) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            padding: 2rem;
            max-width: 900px;
        }

        .hero-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--terracotta));
            color: var(--foam);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--cream);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero h1 span {
            color: var(--gold);
            font-style: italic;
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--latte);
            margin-bottom: 2rem;
            font-style: italic;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .hero-location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--terracotta);
            font-weight: 500;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            fill: var(--gold);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .nav.visible {
            transform: translateY(0);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--latte);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* Main Content */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Intro Section */
        .intro {
            padding: 5rem 0;
            text-align: center;
        }

        .intro-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 3vw, 1.6rem);
            color: var(--light-roast);
            max-width: 700px;
            margin: 0 auto;
            line-height: 2;
        }

        .intro-text::first-letter {
            font-size: 4rem;
            float: left;
            line-height: 1;
            padding-right: 1rem;
            color: var(--medium-roast);
            font-family: 'Playfair Display', serif;
        }

        /* Story Section */
        .story-section {
            padding: 4rem 0;
            position: relative;
        }

        .story-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(44, 24, 16, 0.1);
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .story-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold), var(--terracotta));
        }

        .story-number {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            color: var(--cream);
            position: absolute;
            top: -1rem;
            right: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .story-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--dark-roast);
            margin-bottom: 1.5rem;
            position: relative;
        }

        .story-card p {
            color: var(--light-roast);
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        /* Trend Cards */
        .trends-grid {
            display: grid;
            gap: 2rem;
            margin: 4rem 0;
        }

        .trend-card {
            background: linear-gradient(135deg, var(--dark-roast), var(--medium-roast));
            border-radius: 20px;
            padding: 2.5rem;
            color: var(--cream);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .trend-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(44, 24, 16, 0.3);
        }

        .trend-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.1) 0%, transparent 70%);
        }

        .trend-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .trend-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--gold);
        }

        .trend-card p {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        /* Quote Section */
        .quote-section {
            padding: 5rem 2rem;
            background: linear-gradient(135deg, var(--espresso), var(--dark-roast));
            margin: 4rem -1.5rem;
            text-align: center;
            position: relative;
        }

        .quote-section::before,
        .quote-section::after {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            color: var(--gold);
            opacity: 0.2;
            position: absolute;
        }

        .quote-section::before {
            top: 1rem;
            left: 2rem;
        }

        .quote-section::after {
            bottom: -2rem;
            right: 2rem;
        }

        .quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--cream);
            font-style: italic;
            max-width: 700px;
            margin: 0 auto 1.5rem;
            position: relative;
            z-index: 2;
        }

        .quote-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Valencia Section */
        .valencia-section {
            padding: 4rem 0;
        }

        .valencia-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .valencia-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--dark-roast);
            margin-bottom: 1rem;
        }

        .valencia-header p {
            color: var(--light-roast);
            font-size: 1.1rem;
        }

        .barrios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .barrio-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(44, 24, 16, 0.08);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .barrio-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .barrio-emoji {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .barrio-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--dark-roast);
            margin-bottom: 0.5rem;
        }

        .barrio-card p {
            color: var(--light-roast);
            font-size: 0.9rem;
        }

        /* Stats Section */
        .stats-section {
            background: var(--latte);
            border-radius: 20px;
            padding: 3rem 2rem;
            margin: 4rem 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            text-align: center;
