<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendencias de Café de Especialidad 2024 | Tu Coffee Shop en Valencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coffee-dark: #2C1810;
            --coffee-medium: #4A2C2A;
            --coffee-brown: #6F4E37;
            --coffee-light: #A67B5B;
            --cream: #F5E6D3;
            --cream-light: #FDF8F3;
            --espresso: #3C2415;
            --caramel: #C4A35A;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--cream-light);
            color: var(--coffee-dark);
            line-height: 1.8;
        }

        /* Header Hero */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--coffee-dark) 0%, var(--coffee-medium) 50%, var(--coffee-brown) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .hero-content {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
            max-width: 900px;
        }

        .hero-badge {
            display: inline-block;
            background: var(--caramel);
            color: var(--coffee-dark);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--white);
            margin-bottom: 1.5rem;
            line-height: 1.2;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .hero h1 span {
            font-family: 'Dancing Script', cursive;
            color: var(--caramel);
            display: block;
            font-size: 0.6em;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--cream);
            max-width: 600px;
            margin: 0 auto 2.5rem;
            font-weight: 300;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .hero-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            color: var(--coffee-light);
            font-size: 0.9rem;
            animation: fadeInUp 1s ease 0.7s both;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            fill: var(--cream);
            opacity: 0.7;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .nav.scrolled {
            background: var(--coffee-dark);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .nav-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--cream);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--caramel);
        }

        /* Main Content */
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 5rem 1.5rem;
        }

        /* Introduction */
        .intro-section {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(44, 24, 16, 0.1);
            margin-bottom: 4rem;
            position: relative;
        }

        .intro-section::before {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            color: var(--cream);
            position: absolute;
            top: -20px;
            left: 20px;
            line-height: 1;
        }

        .intro-text {
            font-size: 1.25rem;
            color: var(--coffee-medium);
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        /* Section Styles */
        .section {
            margin-bottom: 4rem;
        }

        .section-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--cream);
            font-weight: 700;
            line-height: 1;
            margin-bottom: -1rem;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--coffee-dark);
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 1rem;
        }

        .section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--caramel), var(--coffee-light));
            border-radius: 2px;
        }

        .section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--coffee-brown);
            margin: 2rem 0 1rem;
        }

        .section p {
            margin-bottom: 1.5rem;
            color: var(--coffee-medium);
            font-size: 1.05rem;
        }

        /* Feature Cards */
        .feature-grid {
            display: grid;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .feature-card {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(44, 24, 16, 0.08);
            border-left: 4px solid var(--caramel);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(44, 24, 16, 0.15);
        }

        .feature-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--coffee-dark);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .feature-card p {
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: var(--cream);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        /* Story Box */
        .story-box {
            background: linear-gradient(135deg, var(--coffee-dark), var(--coffee-medium));
            color: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            margin: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        .story-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }

        .story-box h3 {
            font-family: 'Playfair Display', serif;
            color: var(--caramel);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .story-box p {
            color: var(--cream);
            position: relative;
            z-index: 1;
        }

        /* Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .stat-item {
            text-align: center;
            padding: 1.5rem;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(44, 24, 16, 0.08);
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--coffee-brown);
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--coffee-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Image Placeholder */
        .image-container {
            margin: 2.5rem 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(44, 24, 16, 0.15);
        }

        .image-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(45deg, var(--coffee-medium), var(--coffee-light));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--cream);
        }

        .image-placeholder svg {
            width: 60px;
            height: 60px;
            fill: currentColor;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .image-caption {
            padding: 1rem 1.5rem;
            background: var(--white);
            font-size: 0.9rem;
            color: var(--coffee-light);
            font-style: italic;
        }

        /* Tip Box */
        .tip-box {
            background: var(--cream);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .tip-icon {
            width: 50px;
            height: 50px;
            background: var(--caramel);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.5rem;
        }

        .tip-content h4 {
            font-family: 'Playfair Display', serif;
            color: var(--coffee-dark);
            margin-bottom: 0.5rem;
        }

            margin-bottom: 0;
